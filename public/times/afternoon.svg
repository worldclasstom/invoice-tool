  <!-- Palm leaves -->
  <ellipse cx="6" cy="26" rx="10" ry="3.5" fill="#22C55E" transform="rotate(-25 6 26)"/>
  <ellipse cx="26" cy="26" rx="10" ry="3.5" fill="#16A34A" transform="rotate(25 26 26)"/>
  <ellipse cx="16" cy="22" rx="9" ry="3" fill="#22C55E" transform="rotate(-5 16 22)"/>
  <ellipse cx="10" cy="30" rx="7" ry="2.5" fill="#16A34A" transform="rotate(-35 10 30)"/>
  <!-- Coconut -->
  <circle cx="16" cy="28" r="2.5" fill="#92400E"/>
