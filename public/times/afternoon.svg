<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Warm sky -->
  <rect x="4" y="40" width="56" height="20" rx="4" fill="#FED7AA"/>
  <!-- Afternoon sun lower -->
  <circle cx="46" cy="28" r="10" fill="#FB923C"/>
  <circle cx="46" cy="28" r="8" fill="#FDBA74"/>
  <!-- Palm tree -->
  <rect x="16" y="32" width="3" height="24" rx="1" fill="#92400E"/>
  <ellipse cx="10" cy="30" rx="8" ry="3" fill="#3A5A40" transform="rotate(-20 10 30)"/>
  <ellipse cx="24" cy="30" rx="8" ry="3" fill="#588157" transform="rotate(20 24 30)"/>
  <ellipse cx="17" cy="28" rx="7" ry="3" fill="#3A5A40" transform="rotate(-5 17 28)"/>
  <!-- Small cloud -->
  <ellipse cx="36" cy="16" rx="8" ry="4" fill="#FFF7ED" opacity="0.7"/>
</svg>
