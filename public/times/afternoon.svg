  <rect x="0" y="38" width="64" height="26" rx="6" fill="#FED7AA"/>
  <!-- Afternoon sun -->
  <circle cx="48" cy="24" r="12" fill="#FB923C"/>
  <circle cx="48" cy="24" r="10" fill="#FDBA74"/>
