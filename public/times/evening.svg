<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Night sky -->
  <rect x="0" y="0" width="64" height="64" rx="8" fill="#1E293B"/>
  <!-- Moon -->
  <circle cx="46" cy="14" r="9" fill="#FCD34D"/>
  <circle cx="50" cy="12" r="8" fill="#1E293B"/>
  <!-- Stars -->
  <circle cx="10" cy="10" r="1.5" fill="#FCD34D"/>
  <circle cx="22" cy="6" r="1" fill="#FCD34D"/>
  <circle cx="58" cy="28" r="1" fill="#FCD34D"/>
  <circle cx="6" cy="26" r="1.2" fill="#FCD34D"/>
  <circle cx="34" cy="4" r="0.8" fill="#FCD34D"/>
  <circle cx="16" cy="20" r="0.6" fill="#FCD34D"/>
  <!-- Restaurant building -->
  <rect x="6" y="36" width="52" height="24" rx="4" fill="#22C55E"/>
  <rect x="6" y="36" width="52" height="6" rx="4" fill="#16A34A"/>
  <!-- Glowing windows -->
  <rect x="12" y="44" width="10" height="12" rx="2" fill="#FBBF24" opacity="0.9"/>
  <rect x="27" y="44" width="10" height="12" rx="2" fill="#FBBF24" opacity="0.9"/>
  <rect x="42" y="44" width="10" height="12" rx="2" fill="#FBBF24" opacity="0.9"/>
  <!-- Window glow effect -->
  <rect x="12" y="44" width="10" height="12" rx="2" fill="#FEF3C7" opacity="0.3"/>
  <rect x="27" y="44" width="10" height="12" rx="2" fill="#FEF3C7" opacity="0.3"/>
  <rect x="42" y="44" width="10" height="12" rx="2" fill="#FEF3C7" opacity="0.3"/>
  <!-- Door -->
  <rect x="30" y="50" width="4" height="10" rx="1" fill="#15803D"/>
  <!-- MADRE sign -->
  <rect x="20" y="37" width="24" height="4" rx="1" fill="#FBBF24" opacity="0.8"/>
</svg>
